name: boon_mobile_scanner
description: "Boon Mobile Scanner — Biomedical Waste QR Scanner with RSA Digital Certificate Verification"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.2.0

dependencies:
  flutter:
    sdk: flutter
  
  # BLoC State Management
  flutter_bloc: ^8.1.3
  bloc: ^8.1.2
  equatable: ^2.0.5
  
  # Networking
  dio: ^5.3.2
  
  # QR & Camera
  mobile_scanner: ^3.5.5
  qr_flutter: ^4.1.0
  
  # Cryptography (for RSA verification)
  pointycastle: ^3.7.3
  asn1lib: ^1.5.4
  
  # Local Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  
  # UI
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  shimmer: ^3.0.0
  lottie: ^2.7.0
  
  # Utilities
  intl: ^0.18.1
  uuid: ^4.2.1
  connectivity_plus: ^5.0.2
  permission_handler: ^11.1.0
  
  # Firebase & Crashlytics
  firebase_core: ^3.12.0
  firebase_crashlytics: ^4.3.0

  # Toast/Snackbar
  fluttertoast: ^8.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  bloc_test: ^9.1.4
  mocktail: ^1.0.1
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

# ── App Launcher Icons ───────────────────────────────────────────────────────
# Run `flutter pub run flutter_launcher_icons` to regenerate mipmap PNGs
# from the source icon at assets/icon/ic_launcher_source.png
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/ic_launcher_source.png"
  adaptive_icon_background: "#030712"
  adaptive_icon_foreground: "assets/icon/ic_launcher_source.png"
  min_sdk_android: 21
