name: Build Flutter APK

on:
  push:
    branches: [main, master]
    paths:
      - 'mobile/**'
      - '.github/workflows/build-flutter-apk.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'mobile/**'
      - '.github/workflows/build-flutter-apk.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./mobile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter (latest stable)
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Generate platform scaffolding (if android/ missing)
        run: |
          if [ ! -d "android" ]; then
            echo "android/ directory missing — generating with flutter create..."
            flutter create --project-name boon_mobile_scanner --org com.boon --platforms android .
            chmod +x android/gradlew 2>/dev/null || true
            echo "Platform scaffolding generated successfully."
          else
            echo "android/ directory exists — skipping platform generation."
          fi

      - name: Generate local.properties (required by Gradle)
        run: |
          if [ -f "android/local.properties" ]; then
            echo "local.properties already exists — checking content..."
            cat android/local.properties
          else
            echo "local.properties missing — generating..."
            FLUTTER_ROOT="$(dirname $(which flutter))/.."
            echo "FLUTTER_ROOT detected: $FLUTTER_ROOT"
            cat > android/local.properties << LOCALEOF
flutter.sdk=$FLUTTER_ROOT
flutter.versionCode=1
flutter.versionName=1.0.0
LOCALEOF
            echo "local.properties created:"
            cat android/local.properties
          fi

      - name: Debug environment
        run: |
          echo "## System Info" >> $GITHUB_STEP_SUMMARY
          echo "- Flutter: $(flutter --version 2>&1 | head -1)" >> $GITHUB_STEP_SUMMARY
          echo "- Java: $(java -version 2>&1 | head -1)" >> $GITHUB_STEP_SUMMARY
          echo "- Working dir: $(pwd)" >> $GITHUB_STEP_SUMMARY
          echo "- Android SDK: ${ANDROID_HOME:-not set}" >> $GITHUB_STEP_SUMMARY
          echo "- FLUTTER_ROOT: ${FLUTTER_ROOT:-not set}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Android directory structure" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          ls -la android/ >> $GITHUB_STEP_SUMMARY
          ls -la android/app/ >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Setup release keystore
        run: |
          if [ -f "keystore/boon-release-keystore.p12" ]; then
            echo "Found release keystore — configuring release signing..."
            bash keystore/setup_keystore.sh
            echo "Keystore setup complete."
          else
            echo "No keystore found — release builds will use debug signing."
          fi

      - name: Restore Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('mobile/pubspec.yaml', 'mobile/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Analyze code (non-fatal)
        run: flutter analyze --no-fatal-infos --no-fatal-warnings || echo "Analysis completed with warnings (see logs)"

      - name: Run tests (non-blocking)
        run: |
          flutter test --reporter expanded || {
            EXIT_CODE=$?
            echo "::warning title=Tests failed::$EXIT_CODE test(s) failed — continuing with APK build"
          }

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Build release APK + App Bundle (main branch only)
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        run: |
          if [ -f "android/key.properties" ]; then
            echo "Building signed release APK..."
            flutter build apk --release
            echo "Building signed release App Bundle..."
            flutter build appbundle --release
            echo "Release artifacts built successfully."
          else
            echo "::warning::No keystore found — building debug artifacts instead"
            flutter build apk --debug
            flutter build appbundle --debug
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: boon-scanner-apk
          path: mobile/build/app/outputs/flutter-apk/*.apk
          retention-days: 30
          if-no-files-found: warn

      - name: Upload App Bundle artifact
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: actions/upload-artifact@v4
        with:
          name: boon-scanner-aab
          path: mobile/build/app/outputs/bundle/release/*.aab
          retention-days: 30
          if-no-files-found: warn

      - name: Build summary
        run: |
          echo "## :rocket: Boon Scanner — Build Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          APK_FILES=$(find build/app/outputs/flutter-apk/ -name "*.apk" 2>/dev/null)
          AAB_FILES=$(find build/app/outputs/bundle/release/ -name "*.aab" 2>/dev/null)

          if [ -n "$APK_FILES" ]; then
            echo "**Debug APK** — built successfully" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            ls -lh $APK_FILES >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "**Debug APK** — not found (check build logs)" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -n "$AAB_FILES" ] && [ "${{ github.ref }}" = "refs/heads/main" -o "${{ github.ref }}" = "refs/heads/master" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Release App Bundle** — built successfully" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            ls -lh $AAB_FILES >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Quick Install" >> $GITHUB_STEP_SUMMARY
          echo "1. Download the **boon-scanner-apk** artifact from the summary above" >> $GITHUB_STEP_SUMMARY
          echo "2. Open it on your Android device" >> $GITHUB_STEP_SUMMARY
          echo "3. Allow installation from unknown sources if prompted" >> $GITHUB_STEP_SUMMARY
          echo "4. Configure the backend URL in Settings → Server" >> $GITHUB_STEP_SUMMARY
